<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bamba Mega Spin — Win Ksh 10,000 Cash</title>
    <style>
        :root {
            --primary: #1ebd56; /* M-Pesa Green */
            --accent: #f5b041;  /* Gold */
            --danger: #fc5c65;  /* Coral Red */
            --dark-bg: #0f141c; 
            --card-bg: #1a2232;
            --border-color: #2b384e;
            --text-main: #ffffff;
            --text-muted: #8ca1c4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 16px;
        }

        .app-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 420px;
            border-radius: 24px;
            padding: 32px 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .header {
            margin-bottom: 20px;
        }

        .jackpot-badge {
            background: linear-gradient(135deg, #ff4757, #f5b041);
            color: #fff;
            font-size: 0.85rem;
            font-weight: 800;
            padding: 8px 20px;
            border-radius: 100px;
            display: inline-block;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* Counter Widget */
        .spin-counter {
            background: #111622;
            padding: 10px 16px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
        }

        .counter-badge {
            background: var(--danger);
            color: white;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        /* Wheel Graphic Framework */
        .stage {
            position: relative;
            width: 260px;
            height: 260px;
            margin: 0 auto 28px auto;
        }

        .pointer-hardware {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 32px;
            background: var(--accent);
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 10;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .wheel-outer {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid var(--border-color);
            background: #121824;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Customized Wheel showing the irresistible prize */
        .wheel-canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                #ff4757 0deg 60deg,    /* Grand Prize Segment */
                #2b384e 60deg 120deg,
                #1a2232 120deg 180deg,
                #2b384e 180deg 240deg,
                #1a2232 240deg 300deg,
                #2b384e 300deg 360deg
            );
            position: relative;
        }

        /* Center Golden Star */
        .wheel-center {
            position: absolute;
            width: 70px;
            height: 70px;
            background: var(--accent);
            border-radius: 50%;
            z-index: 5;
            box-shadow: 0 0 15px rgba(245, 176, 65, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: 900;
            color: #0f141c;
            text-transform: uppercase;
        }

        /* Live Feedback Feed */
        .status-banner {
            min-height: 50px;
            padding: 12px;
            border-radius: 12px;
            background: #111622;
            border: 1px solid var(--border-color);
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .text-alert { color: var(--danger); font-weight: 700; }
        .text-normal { color: var(--text-muted); }

        /* Action Panel */
        .action-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 800;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-accent {
            background: var(--accent);
            color: #0f141c;
            box-shadow: 0 4px 15px rgba(245, 176, 65, 0.3);
        }

        .btn-primary {
            background: var(--primary);
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(30, 189, 86, 0.3);
        }

        .secure-footer {
            margin-top: 24px;
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .hide { display: none !important; }
    </style>
</head>
<body>

    <div class="app-card">
        <div class="header">
            <span class="jackpot-badge">🔥 KSH 10,000 GRAND PRIZE</span>
            <h1>Bamba Mega Spin</h1>
            <p class="subtitle">Spin the wheel to win instant mobile money</p>
        </div>

        <!-- Spin Balance Display -->
        <div class="spin-counter">
            <span>Your Available Spins:</span>
            <span class="counter-badge" id="spinCount">0</span>
        </div>

        <div class="stage">
            <div class="pointer-hardware"></div>
            <div class="wheel-outer">
                <div class="wheel-center">WIN KSH<br>10,000</div>
                <div class="wheel-canvas" id="wheel"></div>
            </div>
        </div>

        <div class="status-banner" id="statusMessage">
            <span class="text-normal">Click SPIN NOW to test your luck.</span>
        </div>

        <div class="action-panel">
            <!-- STEP 1: Attempt to spin -->
            <button class="btn btn-accent" id="spinBtn" onclick="attemptSpin()">
                Spin Now
            </button>

            <!-- STEP 2: Recharge (Hidden initially, appears after error) -->
            <button class="btn btn-primary hide" id="rechargeBtn" onclick="redirectToPaylink()">
                Get lucky Spin (Ksh 20)
            </button>
        </div>

        <div class="secure-footer">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
            Verified Secure Paybill • 18+ Only
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        // Change this to your actual third-party payment link page:
        const MY_PAY_LINK = "https://link.palpluss.com/28de0a52-88af-448d-90dc-b64a5c2b6cc2"; 

        const spinBtn = document.getElementById('spinBtn');
        const rechargeBtn = document.getElementById('rechargeBtn');
        const statusMessage = document.getElementById('statusMessage');

        function attemptSpin() {
            // Trigger error since balance is 0
            statusMessage.innerHTML = `<span class="text-alert">⚠️ Error: You do not have spins left!</span>`;
            
            // Switch buttons to force recharge action
            spinBtn.classList.add('hide');
            rechargeBtn.classList.remove('hide');
        }

        function redirectToPaylink() {
            statusMessage.innerHTML = `<span class="text-normal">Opening secure M-Pesa portal...</span>`;
            
            // Send the user directly to the payment link page
            window.location.href = MY_PAY_LINK;
        }
    </script>
</body>
</html>
